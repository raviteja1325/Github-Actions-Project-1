name: github-actions for java project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-code:
    name: code compile job
    runs-on: self-hosted
    steps:
    - name: checkout code repo
      uses: actions/checkout@v4
    - name: set up jdk installation
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: build with maven
      run: mvn compile 
  
  security-check:
    runs-on: self-hosted
    needs: compile-code
    steps:
    - name: checkout code repo
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: trivy dependency scan
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        format: 'table'
        scan-type: 'fs'
        scan-ref: '.'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
    - name: git leaks scan for detecting hardcoded secrets
      uses: gitleaks/gitleaks-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-testing:
    runs-on: self-hosted
    needs: security-check
    steps:
    - name: checkout code repo
      uses: actions/checkout@v4
    - name: setup java installation
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: run unit test
      run: mvn test

  build-project-and-sonarscan:
    runs-on: self-hosted
    needs: unit-testing
    steps:
    - name: checkout code repo
      uses: actions/checkout@v4
      with: 
        fetch-depth: '0'
    - name: setup java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build and package code
      run: mvn package
    - name: upload jar artifact 
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
    - name: sonar scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_URL: ${{ secrets.SONAR_URL }}
    - name: sonarqube quality gate check
      uses: SonarSource/sonarqube-quality-gate-action@v1
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_URL: ${{ secrets.SONAR_URL }} 
      
